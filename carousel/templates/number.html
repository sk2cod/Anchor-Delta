<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="base.css">
  <style>
    /* accent override — set by caller per domain */
    .slide { --accent: {{ accent_colour }}; }

    /* Rows need width to let the value sit right of the label. */
    .content { --measure: 1550px; justify-content: center; }

    /* Optical-centre composition (same technique as cover.html, kept
       from this session's fixes): content-wrapper's shared top/bottom
       padding is overridden locally so the content band's own midpoint
       sits ~46% from the top of the canvas rather than the shared
       chassis default (~53%) — the block no longer sits low or left.
       justify-content: center (not space-between — DESIGN_LESSONS
       "space-between breaks short content") keeps it stable regardless
       of copy length. */
    .content-wrapper {
      --content-top: 200px;
      --content-bottom: 416px;
    }

    .date-label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 36px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-footer);
      margin-bottom: 48px;
    }

    .headline {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 120px;
      line-height: 1.15;
      color: var(--text-primary);
      letter-spacing: -1px;
      margin-bottom: 64px;
    }

    /* Label/value row — the tabular element: unit label left, isolated
       figure right. justify-content: space-between here is a bounded
       2-item horizontal spread within one row, not the vertical
       variable-content anti-pattern DESIGN_LESSONS warns against. */
    .number-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 64px 0;
    }

    .number-divider {
      width: 100%;
      height: 2px;                /* 1px at 1x, doubled for 2x render */
      background: var(--accent);
      opacity: 0.15;
    }

    .number-label {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 40px;
      color: var(--text-muted);
    }

    .dominant-number {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 72px;
      color: var(--accent);
      line-height: 1;
    }

    /* Explanatory body — dominant_number.context, a real explanation,
       never a duplicate of the figure/headline. Standard muted cream
       (this session's fix — kept), narrower than the row so it wraps
       cleanly. */
    .context-label {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 52px;
      color: #8A8078;
      margin-top: 40px;
      line-height: 1.5;
      max-width: 70%;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
<div class="slide">
  <div class="domain-tag">{{ domain_label }}</div>
  <div class="content-wrapper">
    <div class="content">
      <div class="date-label">{{ date_label }}</div>
      <h1 class="headline">{{ headline }}</h1>

      <div class="number-row">
        <span class="number-label">{{ number_row_1_label }}</span>
        <span class="dominant-number">{{ number_row_1_value }}</span>
      </div>
      <div class="number-divider"></div>

      <p class="context-label">{{ context_label }}</p>
    </div>
  </div>

  <footer class="footer">
    <span class="page-indicator">{{ page_indicator }}</span>
    <span class="wordmark">{{ wordmark }}</span>
  </footer>
</div>
</body>
</html>
