<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="base.css">
  <style>
    /* accent override — set by caller per domain */
    .slide { --accent: {{ accent_colour }}; }

    /* True vertical centring: a full-height flex wrapper, no positioning
       offsets. This is the only centring mechanism on this template —
       no --content-top/--content-bottom, no --measure. */
    .fs-outer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fs-card {
      width: 1555px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .fs-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-style: italic;
      font-size: 72px;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 16px;
    }

    .fs-divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      opacity: 0.5;
      margin: 0 auto 48px auto;
    }

    .fs-rows {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .fs-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 40px;
      padding: 28px 0;
      border-top: 2px solid color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .fs-row--last {
      border-bottom: 2px solid color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .fs-desc {
      flex: 1;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 60px;
      line-height: 1.4;
      color: #8A8078;
      text-align: left;
    }

    .fs-figure {
      flex-shrink: 0;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 84px;
      color: var(--accent);
      white-space: nowrap;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="slide">
  <div class="domain-tag">{{ domain_label }}</div>

  <div class="fs-outer">
    <div class="fs-card">
      {% if factsheet_title %}<div class="fs-title">{{ factsheet_title }}</div>{% endif %}
      <div class="fs-divider"></div>
      <div class="fs-rows">
        {% for row in dominant_numbers %}
        <div class="fs-row{% if loop.last %} fs-row--last{% endif %}">
          <span class="fs-desc">{{ row.context }}</span>
          <span class="fs-figure">{{ row.value }}</span>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

  <footer class="footer">
    <span class="page-indicator">{{ page_indicator }}</span>
    <span class="wordmark">{{ wordmark }}</span>
  </footer>
</div>
</body>
</html>
