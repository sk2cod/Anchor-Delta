<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="base.css">
  <style>
    /* accent override — set by caller per domain */
    .slide { --accent: {{ accent_colour }}; }

    /* A lone pull-quote has nothing tall to fill the upper band, so both
       block-top (bottom void) and space-between (middle void) look off.
       Center the attribution+quote as one unit instead: the leftover space
       splits into symmetric top/bottom margins, which reads as intentional
       breathing room. This is the recognised pull-quote treatment.
       To switch back to top-aligned block, change 'center' to 'flex-start'. */
    .content {
      --measure: 1300px;
      justify-content: center;
    }

    /* Explicit z-index on content-wrapper establishes a stacking context
       so all of its descendants reliably paint above the giant
       decorative marks below, regardless of their own (unpositioned)
       stacking. */
    .content-wrapper { z-index: 2; }

    /* Giant decorative quotation marks — a large low-opacity background
       flourish, distinct from the small inline marks already bookending
       .quote-text below. Positioned with clearance from the domain tag
       (top-left) and footer (bottom-right) so they never collide with
       actual chassis text. */
    .quote-mark-open,
    .quote-mark-close {
      position: absolute;
      z-index: 1;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 180px;
      line-height: 1;
      color: var(--accent);
      opacity: 0.15;
      pointer-events: none;
    }

    .quote-mark-open {
      top: calc(var(--pad-y) + 100px);
      left: var(--pad-x);
    }

    .quote-mark-close {
      bottom: calc(var(--pad-y) + 180px);
      right: var(--pad-x);
    }

    /* Name — prominent, standard cream. */
    .attribution {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 32px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    /* Role — supporting, standard muted. Distinct level from the name
       above it: smaller, lighter weight, dimmer colour. */
    .quote-role {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 28px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .quote-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-style: italic;
      font-size: 100px;
      line-height: 1.2;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .quote-text::before {
      content: '\201C';
      color: var(--accent);
    }

    .quote-text::after {
      content: '\201D';
      color: var(--accent);
    }

    .quote-text .accent {
      color: var(--accent);
    }
  </style>
</head>
<body>
<div class="slide">
  <div class="domain-tag">{{ domain_label }}</div>
  <div class="quote-mark-open">&ldquo;</div>
  <div class="quote-mark-close">&rdquo;</div>
  <div class="content-wrapper">
    <div class="content">
      <p class="quote-text">{{ quote_text }}</p>
      <div class="rule"></div>
      <div class="attribution">{{ attribution }}</div>
      {% if role %}<div class="quote-role">{{ role }}</div>{% endif %}
    </div>
  </div>

  <footer class="footer">
    <span class="page-indicator">{{ page_indicator }}</span>
    <span class="wordmark">{{ wordmark }}</span>
  </footer>
</div>
</body>
</html>
