<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="base.css">
  <style>
    /* accent override — set by caller per domain */
    .slide { --accent: {{ accent_colour }}; }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 0;
    }

    .attribution {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 32px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-footer);
      margin-bottom: 48px;
    }

    .quote-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-style: italic;
      font-size: 100px;
      line-height: 1.2;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .quote-text::before {
      content: '\201C';
      color: var(--accent);
    }

    .quote-text::after {
      content: '\201D';
      color: var(--accent);
    }
  </style>
</head>
<body>
<div class="slide">
  <div class="domain-tag">{{ domain_label }}</div>

  <div class="content">
    <div class="attribution">{{ attribution }}</div>
    <p class="quote-text">{{ quote_text }}</p>
  </div>

  <footer class="footer">
    <span class="page-indicator">{{ page_indicator }}</span>
    <span class="wordmark">{{ wordmark }}</span>
  </footer>
</div>
</body>
</html>
