<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="base.css">
  <style>
    /* accent override — set by caller per domain */
    .slide { --accent: {{ accent_colour }}; }

    .content {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .headline {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 160px;
      line-height: 1.05;
      color: var(--text-primary);
      letter-spacing: -1px;
    }

    .emphasis-line {
      font-family: var(--font-display);
      font-weight: 700;
      font-style: italic;
      font-size: 110px;
      line-height: 1.2;
      color: var(--accent);
    }
  </style>
</head>
<body>
<div class="slide">
  <div class="domain-tag">{{ domain_label }}</div>
  <div class="content-wrapper">
    <div class="content">
      <h1 class="headline">{{ headline }}</h1>
      <div class="rule"></div>
      <p class="emphasis-line">{{ emphasis_line }}</p>
    </div>
  </div>

  <footer class="footer">
    <span class="page-indicator">{{ page_indicator }}</span>
    <span class="wordmark">{{ wordmark }}</span>
  </footer>
</div>
</body>
</html>
