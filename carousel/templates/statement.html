<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="base.css">
  <style>
    /* accent override — set by caller per domain */
    .slide { --accent: {{ accent_colour }}; }

    .content { --measure: 1250px; }

    .headline {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 152px;
      line-height: 1.05;
      color: var(--text-primary);
      letter-spacing: -1px;
    }

    .body-text {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 72px;
      line-height: 1.65;
      color: #6B6560;
    }

    .body-text .accent {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }
  </style>
</head>
<body>
<div class="slide">
  <div class="domain-tag">{{ domain_label }}</div>
  <div class="content-wrapper">
    <div class="content">
      <h1 class="headline">{{ headline }}</h1>
      <div class="rule"></div>
      <p class="body-text">{{ body_html }}</p>
    </div>
  </div>

  <footer class="footer">
    <span class="page-indicator">{{ page_indicator }}</span>
    <span class="wordmark">{{ wordmark }}</span>
  </footer>
</div>
</body>
</html>
